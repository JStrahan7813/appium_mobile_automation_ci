name: Appium & Mobile Portfolio CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ui-verification-tests:
    runs-on: ubuntu-latest # Switched to Linux (runs instantly and never queues!)
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install pytest Appium-Python-Client selenium

      - name: Launch Headless Webdriver Container Engine
        run: |
          # Spins up a lightning-fast standalone chrome image mimicking our Appium endpoint
          docker run -d -p 4444:4444 --shm-size=2g selenium/standalone-chrome:latest
          
          # Wait a brief moment for the network port interface to bind cleanly
          echo "Warming up headless automation environment..."
          sleep 5

      - name: Execute Automated Test Suite
        run: |
          # Fire your testing framework with clean logging outputs
          pytest -v -s tests/
