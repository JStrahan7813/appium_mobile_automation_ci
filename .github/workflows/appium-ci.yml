name: Appium Real Device Cloud CI

on:
  push:
    branches: [ main ]
  pull_request: 
    branches: [ main ]
  workflow_dispatch:

jobs:
  real-device-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install pytest Appium-Python-Client

      - name: Pre-upload Demo App and Execute Cloud Appium Tests
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_ACCESS_KEY: ${{ secrets.SAUCE_ACCESS_KEY }}
        run: |
          # 🗄️ DOWNLOAD THE GENUINE DEMO APK ASSET
          curl -L -o mda-2.2.0-25.apk https://github.com/saucelabs/my-demo-app-android/releases/download/v2.2.0/mda-2.2.0-25.apk
          
          # 🚀 UPLOAD DIRECTLY INTO YOUR EUROPEAN SAUCE LABS PROFILE STORAGE
          curl -u "$SAUCE_USERNAME:$SAUCE_ACCESS_KEY" -X POST \
            "https://api.eu-central-1.saucelabs.com/v1/storage/upload" \
            -F "payload=@mda-2.2.0-25.apk" \
            -F "name=mda-2.2.0-25.apk"
          
          # 🧪 RUN EXPLICIT PYTEST SUITE NOW THAT THE CLOSET IS PACKED!
          PYTHONPATH=. pytest -v -s tests/
